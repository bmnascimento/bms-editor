const { useState, useRef, useCallback, useEffect, useMemo } = React;

/* ═══════════════════════════════════════════════════════════════
   Constants
   ═══════════════════════════════════════════════════════════════ */
const ROWS = 24, COLS = 80;
const CELL_W = 9.6, CELL_H = 20;
const GRID_W = COLS * CELL_W, GRID_H = ROWS * CELL_H;

let _nid = 1;
const gid = () => `f${_nid++}`;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

const ATTR_G = {
  protection: ["ASKIP", "PROT", "UNPROT"],
  intensity: ["NORM", "BRT", "DRK"],
  flags: ["NUM", "IC", "FSET"],
};

const COLOR_OPTS   = ["DEFAULT","BLUE","GREEN","TURQUOISE","NEUTRAL","RED","PINK","YELLOW","WHITE"];
const HILIGHT_OPTS = ["OFF","UNDERLINE","BLINK","REVERSE"];
const CASE_OPTS    = ["UPPER","MIXED"];
const VALIDN_OPTS  = ["","MUSTFILL","MUSTENTER","TRIGGER"];

const TIPS = {
  nome:   "Nome do campo no DSECT (≤8 chars, maiúsculo). Vazio = label anônimo, sem entrada no repositório.",
  linha:  "Posição vertical na tela (1–24).",
  coluna: "Posição horizontal na tela (1–80).",
  tam:    "Comprimento do campo em caracteres na tela.",
  inicial:"Texto exibido ao abrir o mapa. Em labels define o conteúdo fixo; em campos de entrada é o valor pré-preenchido.",
  picout: "Máscara de formatação de saída (ex: ZZZZ.ZZZ.ZZZ.ZZ9,99). Aplicada pelo CICS ao enviar o valor ao terminal.",

};

const BMS_COLORS = {
  DEFAULT:   null,
  BLUE:      { bg: "#050d1a", fg: "#4488ee" },
  GREEN:     { bg: "#051205", fg: "#33cc55" },
  TURQUOISE: { bg: "#041010", fg: "#22ccbb" },
  NEUTRAL:   { bg: "#0e0e0e", fg: "#aaaaaa" },
  RED:       { bg: "#1a0505", fg: "#ff5555" },
  PINK:      { bg: "#1a0510", fg: "#ff88cc" },
  YELLOW:    { bg: "#191400", fg: "#ddcc22" },
  WHITE:     { bg: "#101010", fg: "#e0e0e0" },
};

const SAMPLE = `DEMOSET  DFHMSD TYPE=&SYSPARM,                                        X
               MODE=INOUT,                                            X
               LANG=COBOL,                                            X
               CTRL=FREEKB,                                           X
               STORAGE=AUTO,                                          X
               TIOAPFX=YES
DEMOMAP  DFHMDI SIZE=(24,80),                                         X
               LINE=1,                                                X
               COLUMN=1
TITLE    DFHMDF POS=(1,25),                                           X
               LENGTH=30,                                             X
               ATTRB=(ASKIP,BRT),                                     X
               INITIAL='SISTEMA DE EXEMPLO'
LBLNOM   DFHMDF POS=(4,2),                                            X
               LENGTH=12,                                             X
               ATTRB=(ASKIP,NORM),                                    X
               INITIAL='NOME......:'
INPNOM   DFHMDF POS=(4,15),                                           X
               LENGTH=40,                                             X
               ATTRB=(UNPROT,IC,FSET)
LBLCPF   DFHMDF POS=(6,2),                                            X
               LENGTH=12,                                             X
               ATTRB=(ASKIP,NORM),                                    X
               INITIAL='CPF.......:'
INPCPF   DFHMDF POS=(6,15),                                           X
               LENGTH=14,                                             X
               ATTRB=(UNPROT,NUM)
LBLEND   DFHMDF POS=(8,2),                                            X
               LENGTH=12,                                             X
               ATTRB=(ASKIP,NORM),                                    X
               INITIAL='ENDERECO..:'
INPEND   DFHMDF POS=(8,15),                                           X
               LENGTH=50,                                             X
               ATTRB=(UNPROT,FSET)
MSG      DFHMDF POS=(22,2),                                           X
               LENGTH=76,                                             X
               ATTRB=(ASKIP,BRT)
CMDLINE  DFHMDF POS=(24,2),                                           X
               LENGTH=76,                                             X
               ATTRB=(UNPROT,IC)
         DFHMSD TYPE=FINAL
         END`;

/* ═══════════════════════════════════════════════════════════════
   BMS Parser — robust: detects statements by DFHM keyword presence,
   handles any continuation character (X, C, etc.) and survives
   whitespace changes from copy-paste.
   ═══════════════════════════════════════════════════════════════ */
function cleanLine(raw) {
  let l = raw.replace(/\r$/, "");
  // Strip continuation char at exact column 72 (classic assembler)
  if (l.length >= 72 && /\S/.test(l[71])) l = l.slice(0, 71);
  // Fallback: trailing single char after comma + 2+ spaces (e.g. ",     C")
  else l = l.replace(/,(\s{2,})[A-Za-z*]\s*$/, ",");
  return l.trimEnd();
}

function joinCont(lines) {
  const result = [];
  let current = null;

  for (const raw of lines) {
    const l = raw.replace(/\r$/, "");
    // Skip comments and blank lines
    if (!l.trim() || l.trimStart().startsWith("*")) {
      if (current !== null) { result.push(current); current = null; }
      continue;
    }
    // Skip standalone END
    if (/^\s+END\s*$/.test(l)) {
      if (current !== null) { result.push(current); current = null; }
      continue;
    }

    const clean = cleanLine(l);

    // New statement? (line contains a DFHM macro keyword)
    if (/\bDFHM\w+\b/.test(clean)) {
      if (current !== null) result.push(current);
      current = clean;
    } else if (current !== null) {
      // Continuation — strip leading whitespace and append
      current += clean.replace(/^\s+/, "");
    }
  }
  if (current !== null) result.push(current);
  return result;
}

function parseP(s) {
  const p = {}; let d = 0, q = false, t = ""; const ts = [];
  for (const c of s) {
    if (c === "'" && d === 0) { q = !q; t += c; continue; }
    if (q) { t += c; continue; }
    if (c === "(") d++;
    if (c === ")") d--;
    if (c === "," && d === 0) { ts.push(t.trim()); t = ""; continue; }
    t += c;
  }
  if (t.trim()) ts.push(t.trim());
  for (const tk of ts) {
    const eq = tk.indexOf("=");
    if (eq === -1) continue;
    const k = tk.slice(0, eq).trim().toUpperCase();
    let v = tk.slice(eq + 1).trim();
    if (v.startsWith("'") && v.endsWith("'")) v = v.slice(1, -1);
    p[k] = v;
  }
  return p;
}

function parsePos(s) {
  const m = s && s.match(/\((\d+)\s*,\s*(\d+)\)/);
  return m ? { row: +m[1], col: +m[2] } : { row: 1, col: 1 };
}

function parseAttr(s) {
  if (!s) return ["ASKIP", "NORM"];
  return s.replace(/^\(/, "").replace(/\)$/, "").split(",").map(a => a.trim().toUpperCase()).filter(Boolean);
}

function parseTimestamp(src) {
  for (const line of src.split("\n")) {
    const m = line.match(/^\*\s*TIMESTAMP\s*=\s*(\d{12,14})/);
    if (m) {
      const d = m[1];
      // Format: HHMMSSYYYYMMDD (14 digits)
      const hh = d.slice(0,2), mi = d.slice(2,4), ss = d.slice(4,6);
      const yyyy = d.slice(6,10), mm = d.slice(10,12), dd = d.slice(12,14);
      return { raw: m[1], display: `${dd}/${mm}/${yyyy} ${hh}:${mi}:${ss}` };
    }
  }
  return null;
}

function parseBMS(src) {
  const stmts = joinCont(src.split("\n"));
  const ts = parseTimestamp(src);
  const ms = { name: "MAPSET", type: "", mode: "", lang: "", ctrl: "", storage: "", tioapfx: "", data: "", maps: [], timestamp: ts?.display || null, timestampRaw: ts?.raw || null };
  let cur = null;
  for (const st of stmts) {
    const m = st.match(/^(\S+)?\s+(DFHM\w+)\s*(.*)/);
    if (!m) continue;
    const [, label, macro, rest] = m;
    const p = parseP(rest || "");
    if (macro === "DFHMSD") {
      if ((p.TYPE || "").toUpperCase() === "FINAL") continue;
      if (label) ms.name = label;
      if (p.TYPE) ms.type = p.TYPE;
      if (p.MODE) ms.mode = p.MODE;
      if (p.LANG) ms.lang = p.LANG;
      if (p.CTRL) ms.ctrl = p.CTRL;
      if (p.STORAGE) ms.storage = p.STORAGE;
      if (p.TIOAPFX) ms.tioapfx = p.TIOAPFX;
      if (p.DATA)    ms.data    = p.DATA;
    } else if (macro === "DFHMDI") {
      cur = { name: label || "MAP01", color: p.COLOR || "BLUE", extatt: p.EXTATT || "YES",
              size: p.SIZE || "", line: p.LINE || "", column: p.COLUMN || "", fields: [] };
      ms.maps.push(cur);
    } else if (macro === "DFHMDF" && cur) {
      const pos = parsePos(p.POS);
      cur.fields.push({
        id: gid(), name: label || "",
        row: pos.row, col: pos.col,
        length: parseInt(p.LENGTH) || 1,
        attrs: parseAttr(p.ATTRB),
        initial: p.INITIAL || "",
        picout: p.PICOUT || "", picin: p.PICIN || "",
        color:  (p.COLOR  || "DEFAULT").toUpperCase(),
        hilight:(p.HILIGHT|| "OFF").toUpperCase(),
        case:   (p.CASE   || "UPPER").toUpperCase(),
        justify: p.JUSTIFY || "",
        validn:  p.VALIDN  || "",
      });
    }
  }
  if (!ms.maps.length) ms.maps.push({ name: "MAP01", color: "BLUE", extatt: "YES", size: "", line: "", column: "", fields: [] });
  return ms;
}

/* ═══════════════════════════════════════════════════════════════
   BMS Generator
   ═══════════════════════════════════════════════════════════════ */
function fmtMacro(label, macro, pairs) {
  const lbl = (label || "").padEnd(8);
  const pfx = lbl + " " + macro + " ";
  const cont = "               ";
  const ps = pairs.map(([k, v]) => `${k}=${v}`).join(",");
  const full = pfx + ps;
  if (full.length <= 71) return full;
  const lines = []; let rem = ps, first = true;
  while (rem.length > 0) {
    const p = first ? pfx : cont;
    const avail = 71 - p.length;
    if (rem.length <= avail) { lines.push(p + rem); break; }
    const sub = rem.slice(0, avail);
    let br = sub.lastIndexOf(",");
    if (br <= 0) br = avail; else br += 1;
    lines.push((p + rem.slice(0, br)).padEnd(71) + "C");
    rem = rem.slice(br);
    first = false;
  }
  return lines.join("\n");
}

const p2 = n => String(n).padStart(2, "0");
const p3 = n => String(n).padStart(3, "0");

function autoRenumber(ms) {
  const n = JSON.parse(JSON.stringify(ms));
  for (const map of n.maps) {
    const named = map.fields
      .filter(f => f.name !== "")
      .sort((a, b) => a.row - b.row || a.col - b.col);
    named.forEach((f, i) => { f.name = "CAMPO" + String(i + 1).padStart(3, "0"); });
  }
  return n;
}

function genBMS(ms) {
  const o = [];
  if (ms.timestampRaw) o.push(`*   TIMESTAMP=${ms.timestampRaw}`);
  const sdPairs = [["TYPE", ms.type || "&SYSPARM"]];
  if (ms.mode)    sdPairs.push(["MODE",    ms.mode]);
  if (ms.lang)    sdPairs.push(["LANG",    ms.lang]);
  if (ms.ctrl)    sdPairs.push(["CTRL",    ms.ctrl]);
  if (ms.storage) sdPairs.push(["STORAGE", ms.storage]);
  if (ms.tioapfx) sdPairs.push(["TIOAPFX", ms.tioapfx]);
  if (ms.data)    sdPairs.push(["DATA",    ms.data]);
  o.push(fmtMacro(ms.name, "DFHMSD", sdPairs));
  for (const map of ms.maps) {
    const diPairs = [["SIZE", map.size || "(24,80)"]];
    if (map.line)   diPairs.push(["LINE",   map.line]);
    if (map.column) diPairs.push(["COLUMN", map.column]);
    diPairs.push(["COLOR", map.color || "BLUE"]);
    diPairs.push(["EXTATT", map.extatt || "YES"]);
    o.push(fmtMacro(map.name, "DFHMDI", diPairs));
    const sorted = [...map.fields].sort((a, b) => a.row - b.row || a.col - b.col);
    for (const f of sorted) {
      const fp = [
        ["POS",    `(${p2(f.row)},${p2(f.col)})`],
        ["ATTRB",  `(${(f.attrs||[]).join(",")})`],
        ["COLOR",  f.color  || "DEFAULT"],
        ["LENGTH", p3(f.length)],
        ["HILIGHT",f.hilight|| "OFF"],
      ];
      if (f.case && f.case !== "UPPER") fp.push(["CASE", f.case]);
      if (f.initial) fp.push(["INITIAL", `'${f.initial}'`]);
      if (f.picout)  fp.push(["PICOUT",  `'${f.picout}'`]);
      if (f.picin)   fp.push(["PICIN",   `'${f.picin}'`]);
      if (f.justify) fp.push(["JUSTIFY", f.justify]);
      if (f.validn)  fp.push(["VALIDN",  f.validn]);
      o.push(fmtMacro(f.name, "DFHMDF", fp));
    }
  }
  o.push(fmtMacro(ms.name, "DFHMSD", [["TYPE", "FINAL"]]));
  o.push("         END");
  return o.join("\n");
}

/* ═══════════════════════════════════════════════════════════════
   Visual Helpers
   ═══════════════════════════════════════════════════════════════ */
function fColor(f) {
  const attrs = f.attrs || f; // accept full field or bare attrs array
  if (attrs.includes("DRK")) return { bg: "#111", fg: "#2a2a2a" };
  const bmsC = f.color && f.color !== "DEFAULT" ? BMS_COLORS[f.color] : null;
  if (bmsC) {
    if (f.hilight === "REVERSE") return { bg: bmsC.fg, fg: bmsC.bg };
    return bmsC;
  }
  // fallback: protection-based
  const u = attrs.includes("UNPROT"), b = attrs.includes("BRT");
  if (u) return b ? { bg: "#0a2e0a", fg: "#55ff55" } : { bg: "#0a2e0a", fg: "#33cc33" };
  return b ? { bg: "#0a1a2e", fg: "#ffffff" } : { bg: "#0a1a2e", fg: "#44ccee" };
}

function fText(f) {
  if (f.initial) return f.initial.slice(0, f.length).padEnd(f.length);
  if (f.attrs.includes("UNPROT")) return "_".repeat(f.length);
  return "";
}

/* ═══════════════════════════════════════════════════════════════
   Editor Component
   ═══════════════════════════════════════════════════════════════ */
function BMSEditor() {
  const [mapset, setMapset] = useState(() => parseBMS(SAMPLE));
  const [mapIdx] = useState(0);
  const [selIds, setSelIds] = useState(new Set());
  const [mode, setMode] = useState("idle");
  const [dragStart, setDragStart] = useState(null);
  const [dragDelta, setDragDelta] = useState({ dx: 0, dy: 0 });
  const [rb, setRb] = useState(null);
  const [editId, setEditId] = useState(null);
  const [editTxt, setEditTxt] = useState("");
  const [editSel, setEditSel] = useState({s:0, e:0});
  const editInputRef = useRef(null);
  const editAnchorRef = useRef(0);
  const syncSel = () => {
    const el = editInputRef.current;
    if (el) setEditSel({s: el.selectionStart??0, e: el.selectionEnd??0});
  };
  const [showImp, setShowImp] = useState(false);
  const [showExp, setShowExp] = useState(false);
  const [impTxt, setImpTxt] = useState("");
  const [showMs, setShowMs] = useState(false);
  const [placingType, setPlacingType] = useState(null);
  const [dragCopy, setDragCopy] = useState(false);
  const gridRef = useRef(null);
  const modeRef = useRef(mode);
  const dragRef = useRef({ start: null, delta: { dx: 0, dy: 0 } });
  const rbRef = useRef(null);
  const placeTemplateRef = useRef(null);
  modeRef.current = mode;

  // ── Undo / Redo ──
  const histRef = useRef([]);
  const futRef = useRef([]);
  const MAX_HIST = 50;

  const pushMs = useCallback((fnOrVal) => {
    setMapset(prev => {
      const next = typeof fnOrVal === "function" ? fnOrVal(prev) : fnOrVal;
      if (JSON.stringify(prev) === JSON.stringify(next)) return prev; // no-op
      histRef.current = [...histRef.current.slice(-(MAX_HIST - 1)), JSON.stringify(prev)];
      futRef.current = [];
      return next;
    });
  }, []);

  const undo = useCallback(() => {
    if (!histRef.current.length) return;
    setMapset(prev => {
      futRef.current = [...futRef.current, JSON.stringify(prev)];
      return JSON.parse(histRef.current.pop());
    });
  }, []);

  const redo = useCallback(() => {
    if (!futRef.current.length) return;
    setMapset(prev => {
      histRef.current = [...histRef.current, JSON.stringify(prev)];
      return JSON.parse(futRef.current.pop());
    });
  }, []);

  const fields = mapset.maps[mapIdx]?.fields || [];

  const updFields = useCallback((fn) => {
    pushMs(ms => {
      const n = JSON.parse(JSON.stringify(ms));
      fn(n.maps[mapIdx].fields);
      return n;
    });
  }, [mapIdx, pushMs]);

  const updField = useCallback((id, u) => {
    updFields(fs => { const f = fs.find(x => x.id === id); if (f) Object.assign(f, u); });
  }, [updFields]);

  const conflictIds = useMemo(() => {
    const ids = new Set();
    for (let i = 0; i < fields.length; i++) {
      for (let j = i + 1; j < fields.length; j++) {
        const a = fields[i], b = fields[j];
        if (a.row !== b.row) continue;
        // each field occupies [col, col+length] (attr byte + content)
        if (a.col <= b.col + b.length && b.col <= a.col + a.length)
          { ids.add(a.id); ids.add(b.id); }
      }
    }
    return ids;
  }, [fields]);

  const findAt = useCallback((x, y) => {
    for (let i = fields.length - 1; i >= 0; i--) {
      const f = fields[i];
      const fx = (f.col - 1) * CELL_W, fy = (f.row - 1) * CELL_H;
      if (x >= fx && x <= fx + f.length * CELL_W && y >= fy && y <= fy + CELL_H) return f;
    }
    return null;
  }, [fields]);

  /* ── Mouse: down on grid → start drag or rubber band ── */
  const onGridDown = useCallback((e) => {
    if (modeRef.current === "placing") return;
    const rect = gridRef.current.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    const hit = findAt(x, y);

    if (hit && editId === hit.id) return; // deixa o input invisível tratar
    if (hit) {
      let newSel;
      let pendingDesel = null;
      if (e.ctrlKey || e.metaKey) {
        newSel = new Set(selIds);
        if (newSel.has(hit.id)) {
          pendingDesel = hit.id; // defer deselect to onUp — might be a drag-copy
        } else {
          newSel.add(hit.id);
        }
      } else if (!selIds.has(hit.id)) {
        newSel = new Set([hit.id]);
      } else {
        newSel = selIds;
      }
      setSelIds(newSel);
      setMode("dragging");
      setDragCopy(e.ctrlKey || e.metaKey);
      dragRef.current = { start: { x, y }, delta: { dx: 0, dy: 0 }, selIds: newSel, pendingDesel };
      setDragStart({ x, y });
      setDragDelta({ dx: 0, dy: 0 });
    } else {
      if (!e.ctrlKey) setSelIds(new Set());
      setMode("rubberband");
      rbRef.current = { x1: x, y1: y, x2: x, y2: y };
      setRb({ x1: x, y1: y, x2: x, y2: y });
    }
  }, [findAt, selIds]);

  /* ── Window-level move/up for reliable drag ── */
  useEffect(() => {
    if (mode !== "dragging" && mode !== "rubberband") return;

    const onMove = (e) => {
      const rect = gridRef.current?.getBoundingClientRect();
      if (!rect) return;
      const x = e.clientX - rect.left, y = e.clientY - rect.top;
      if (modeRef.current === "dragging") {
        const d = { dx: x - dragRef.current.start.x, dy: y - dragRef.current.start.y };
        dragRef.current.delta = d;
        setDragDelta({ ...d });
      } else if (modeRef.current === "rubberband") {
        rbRef.current = { ...rbRef.current, x2: x, y2: y };
        setRb({ ...rbRef.current });
      }
    };

    const onKey = (e) => { if (modeRef.current === "dragging") setDragCopy(e.ctrlKey || e.metaKey); };

    const onUp = (e) => {
      if (modeRef.current === "dragging") {
        const d = dragRef.current.delta;
        const dC = Math.round(d.dx / CELL_W), dR = Math.round(d.dy / CELL_H);
        if (dC !== 0 || dR !== 0) {
          const ids = dragRef.current.selIds || selIds;
          if (e.ctrlKey || e.metaKey) {
            // Copiar: gera novos ids antes para poder selecionar depois
            const idMap = new Map();
            for (const f of fields) {
              if (ids.has(f.id)) idMap.set(f.id, gid());
            }
            pushMs(ms => {
              const n = JSON.parse(JSON.stringify(ms));
              for (const f of n.maps[mapIdx].fields) {
                if (ids.has(f.id)) {
                  n.maps[mapIdx].fields.push({ ...f, id: idMap.get(f.id),
                    row: clamp(f.row + dR, 1, ROWS),
                    col: clamp(f.col + dC, 1, COLS - f.length + 1),
                  });
                }
              }
              return n;
            });
            setSelIds(new Set(idMap.values()));
          } else {
            pushMs(ms => {
              const n = JSON.parse(JSON.stringify(ms));
              for (const f of n.maps[mapIdx].fields) {
                if (ids.has(f.id)) {
                  f.row = clamp(f.row + dR, 1, ROWS);
                  f.col = clamp(f.col + dC, 1, COLS - f.length + 1);
                }
              }
              return n;
            });
          }
        } else if (dragRef.current.pendingDesel) {
          // Ctrl+click with no movement = toggle off
          const id = dragRef.current.pendingDesel;
          setSelIds(prev => { const n = new Set(prev); n.delete(id); return n; });
        }
        setDragCopy(false);
      } else if (modeRef.current === "rubberband" && rbRef.current) {
        const r = rbRef.current;
        const rx1 = Math.min(r.x1, r.x2), ry1 = Math.min(r.y1, r.y2);
        const rx2 = Math.max(r.x1, r.x2), ry2 = Math.max(r.y1, r.y2);
        const hits = new Set();
        for (const f of fields) {
          const fx = (f.col - 1) * CELL_W, fy = (f.row - 1) * CELL_H;
          if (fx + f.length * CELL_W > rx1 && fx < rx2 && fy + CELL_H > ry1 && fy < ry2)
            hits.add(f.id);
        }
        setSelIds(hits);
      }
      setMode("idle");
      setDragDelta({ dx: 0, dy: 0 });
      setRb(null);
    };

    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    window.addEventListener("keydown", onKey);
    window.addEventListener("keyup", onKey);
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      window.removeEventListener("keydown", onKey);
      window.removeEventListener("keyup", onKey);
    };
  }, [mode, fields, selIds, mapIdx, pushMs]);

  /* ── Placement click ── */
  const onGridClick = useCallback((e) => {
    if (modeRef.current !== "placing") return;
    const rect = gridRef.current.getBoundingClientRect();
    const col = Math.floor((e.clientX - rect.left) / CELL_W) + 1;
    const row = Math.floor((e.clientY - rect.top) / CELL_H) + 1;
    const tpl = placeTemplateRef.current || {};
    const nf = {
      id: gid(), name: tpl.name ?? "", row: clamp(row, 1, ROWS), col: clamp(col, 1, COLS - 9),
      length: tpl.length ?? 10, attrs: tpl.attrs ?? ["UNPROT", "NORM"],
      color: tpl.color ?? "DEFAULT", hilight: tpl.hilight ?? "OFF", case: tpl.case ?? "UPPER",
      initial: tpl.initial ?? "", picout: "", picin: "",
    };
    updFields(fs => fs.push(nf));
    setSelIds(new Set([nf.id]));
    setMode("idle");
    placeTemplateRef.current = null;
    setPlacingType(null);
  }, [updFields]);

  /* ── Keyboard ── */
  useEffect(() => {
    const h = (e) => {
      // Undo/Redo — always available (unless typing in input)
      if (e.key === "z" && (e.ctrlKey || e.metaKey) && !editId) {
        e.preventDefault();
        if (e.shiftKey) redo(); else undo();
        return;
      }
      if (e.key === "y" && (e.ctrlKey || e.metaKey) && !editId) {
        e.preventDefault(); redo(); return;
      }
      if (showImp || showExp || showMs) return;
      const inInput = ["INPUT","SELECT","TEXTAREA"].includes(document.activeElement?.tagName);
      if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key) && selIds.size && !editId && !inInput) {
        e.preventDefault();
        const dr = e.key === "ArrowUp" ? -1 : e.key === "ArrowDown" ? 1 : 0;
        const dc = e.key === "ArrowLeft" ? -1 : e.key === "ArrowRight" ? 1 : 0;
        updFields(fs => {
          const sel = fs.filter(f => selIds.has(f.id));
          const minR = Math.min(...sel.map(f => f.row));
          const maxR = Math.max(...sel.map(f => f.row));
          const minC = Math.min(...sel.map(f => f.col));
          const maxC = Math.max(...sel.map(f => f.col + (f.length || 1) - 1));
          if (minR + dr < 1 || maxR + dr > 24) return;
          if (minC + dc < 1 || maxC + dc > 80) return;
          sel.forEach(f => { f.row += dr; f.col += dc; });
        });
        return;
      }
      if ((e.key === "Delete" || e.key === "Backspace") && selIds.size && !editId && !inInput) {
        updFields(fs => { for (let i = fs.length - 1; i >= 0; i--) if (selIds.has(fs[i].id)) fs.splice(i, 1); });
        setSelIds(new Set());
      }
      if (e.key === "F2" && selIds.size === 1 && !editId && !inInput) {
        e.preventDefault();
        const id = [...selIds][0];
        const f = fields.find(x => x.id === id);
        if (f) { setEditId(id); setEditTxt(f.initial); setEditSel({s:f.initial.length,e:f.initial.length}); }
      }
      if (e.key === "Escape") {
        if (modeRef.current === "placing") { setMode("idle"); placeTemplateRef.current = null; setPlacingType(null); }
        if (editId) { setEditId(null); setEditTxt(""); setEditSel({s:0,e:0}); }
      }
      if (e.key === "a" && (e.ctrlKey || e.metaKey) && !editId) {
        e.preventDefault();
        setSelIds(new Set(fields.map(f => f.id)));
      }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [selIds, fields, editId, showImp, showExp, showMs, updFields, undo, redo]);

  useEffect(() => {
    if (editId && editInputRef.current) {
      editInputRef.current.focus();
      const len = editInputRef.current.value.length;
      editInputRef.current.setSelectionRange(len, len);
      setEditSel({s:len, e:len});
    }
  }, [editId]);

  const commitEdit = useCallback(() => {
    if (editId) {
      const f = fields.find(x => x.id === editId);
      const upd = { initial: editTxt };
      // Auto-size labels (non-UNPROT) to text length
      if (f && !f.attrs.includes("UNPROT") && editTxt.length > 0) upd.length = editTxt.length;
      updField(editId, upd); setEditId(null); setEditTxt(""); setEditSel({s:0,e:0});
    }
  }, [editId, editTxt, updField, fields]);

  const doImport = useCallback(() => {
    try {
      const ms = parseBMS(impTxt);
      _nid = ms.maps.reduce((a, m) => a + m.fields.length, 0) + 100;
      pushMs(ms); setSelIds(new Set()); setShowImp(false); setImpTxt("");
    } catch (err) { alert("Erro: " + err.message); }
  }, [impTxt, pushMs]);

  /* ── Grid lines (memoized) ── */
  const gridSvg = [];
  for (let r = 0; r <= ROWS; r++)
    gridSvg.push(<line key={`h${r}`} x1={0} y1={r*CELL_H} x2={GRID_W} y2={r*CELL_H} stroke={r%5===0?"#1e3a1e":"#0f1f0f"} strokeWidth={r%5===0?.7:.3}/>);
  for (let c = 0; c <= COLS; c++)
    gridSvg.push(<line key={`v${c}`} x1={c*CELL_W} y1={0} x2={c*CELL_W} y2={GRID_H} stroke={c%10===0?"#1e3a1e":"#0f1f0f"} strokeWidth={c%10===0?.7:.3}/>);

  const bc = "px-3 py-1.5 text-xs rounded transition-colors ";
  const bP = bc + "bg-emerald-800 hover:bg-emerald-700 text-emerald-100 border border-emerald-600";
  const bD = bc + "bg-zinc-800 hover:bg-zinc-700 text-zinc-200 border border-zinc-600";
  const bX = bc + "bg-red-900/60 hover:bg-red-800 text-red-200 border border-red-700";
  const mono = { fontFamily: "'IBM Plex Mono','Cascadia Code','Fira Code',monospace" };

  return (
    <div className="flex flex-col bg-zinc-950 text-zinc-200 select-none" style={{...mono, height:"100vh"}}>
      {/* Toolbar */}
      <div className="flex items-center gap-1.5 px-3 py-2 bg-zinc-900 border-b border-zinc-700 flex-wrap">
        <span className="text-emerald-400 font-bold text-sm mr-2 tracking-wider">BMS EDITOR</span>
        <div className="h-5 w-px bg-zinc-700 mx-1"/>
        <button className={bD} onClick={()=>setShowImp(true)}>Importar</button>
        <button className={bD} onClick={()=>setShowExp(true)}>Exportar</button>
        <div className="h-5 w-px bg-zinc-700 mx-1"/>
        {mode==="placing"
          ? <span className="flex items-center gap-2 text-emerald-400 text-xs px-1">
              <span style={{animation:"bms-blink 1s step-end infinite"}}>✦</span>
              {`Clique para + ${placingType||"campo"}...`}
              <button className="text-zinc-400 hover:text-zinc-200 ml-1"
                onClick={()=>{setMode("idle");placeTemplateRef.current=null;setPlacingType(null)}}>✕</button>
            </span>
          : <>
              <button className={bD} title="Texto fixo — ASKIP+NORM, COLOR=TURQUOISE"
                onClick={()=>{placeTemplateRef.current={name:"",attrs:["ASKIP","NORM"],color:"TURQUOISE",hilight:"OFF",case:"UPPER",initial:"LABEL",length:5};setPlacingType("label");setMode("placing")}}>+ Label</button>
              <button className={bD} title="Campo de saída — ASKIP+NORM, nomeado"
                onClick={()=>{placeTemplateRef.current={name:"",attrs:["ASKIP","NORM"],color:"DEFAULT",hilight:"OFF",case:"MIXED",initial:"",length:10};setPlacingType("saída");setMode("placing")}}>+ Saída</button>
              <button className={bP} title="Campo de entrada — UNPROT+FSET, HILIGHT=UNDERLINE"
                onClick={()=>{placeTemplateRef.current={name:"",attrs:["UNPROT","FSET"],color:"NEUTRAL",hilight:"UNDERLINE",case:"MIXED",initial:"",length:10};setPlacingType("entrada");setMode("placing")}}>+ Entrada</button>
            </>
        }
        <button className={bX} disabled={!selIds.size}
          onClick={()=>{updFields(fs=>{for(let i=fs.length-1;i>=0;i--)if(selIds.has(fs[i].id))fs.splice(i,1)});setSelIds(new Set())}}>
          Excluir
        </button>
        <button className={bD} onClick={()=>setShowMs(true)}>Mapset</button>
        <div className="flex-1"/>
        <span className="text-zinc-500 text-xs">
          {mapset.name}/{mapset.maps[mapIdx]?.name} · {fields.length} campos
          {selIds.size>0&&` · ${selIds.size} sel`}
        </span>
      </div>

      {/* Main */}
      <div className="flex flex-1 overflow-hidden">
        {/* Grid */}
        <div className="flex-1 overflow-auto p-3"
          style={{background:"radial-gradient(ellipse at center,#0a1a0a 0%,#050a05 100%)"}}>
          <div style={{display:"inline-block",position:"relative",paddingLeft:28,paddingTop:16,minWidth:"fit-content"}}>
            {/* Col headers */}
            {[1,10,20,30,40,50,60,70,80].map(c=>(
              <span key={c} className="absolute text-zinc-600" style={{left:28+(c-1)*CELL_W,top:1,fontSize:9}}>{c}</span>
            ))}
            {/* Row headers */}
            {Array.from({length:ROWS},(_,i)=>(
              <span key={i} className="absolute text-zinc-600 text-right" style={{left:0,top:16+i*CELL_H+4,width:22,fontSize:9}}>{i+1}</span>
            ))}

            <div ref={gridRef} className="relative overflow-hidden"
              style={{width:GRID_W,height:GRID_H,cursor:mode==="placing"?"crosshair":"default",
                border:"1px solid #2a4a2a",borderRadius:2,
                boxShadow:"0 0 30px rgba(0,255,80,0.05),inset 0 0 60px rgba(0,0,0,0.5)"}}
              onMouseDown={onGridDown} onClick={onGridClick}>

              <svg className="absolute inset-0 pointer-events-none" width={GRID_W} height={GRID_H}>{gridSvg}</svg>

              {fields.map(f=>{
                const sel = selIds.has(f.id);
                const conflict = !sel && conflictIds.has(f.id);
                const dx = mode==="dragging"&&sel&&!dragCopy?Math.round(dragDelta.dx/CELL_W)*CELL_W:0;
                const dy = mode==="dragging"&&sel&&!dragCopy?Math.round(dragDelta.dy/CELL_H)*CELL_H:0;
                const c = fColor(f);
                const blinkStyle = f.hilight==="BLINK" ? {animation:"bms-blink 1s step-end infinite"} : {};
                return (
                  <div key={f.id} className={`absolute flex items-center ${editId===f.id?"overflow-visible":"overflow-hidden"}`}
                    style={{left:(f.col-1)*CELL_W+dx,top:(f.row-1)*CELL_H+dy,
                      width:(editId===f.id&&!f.attrs.includes("UNPROT")?Math.max(f.length,editTxt.length+1):f.length)*CELL_W,height:CELL_H,
                      backgroundColor:c.bg,color:c.fg,fontSize:CELL_W*1.3,
                      lineHeight:CELL_H+"px",
                      border:sel?"1.5px solid #fbbf24":conflict?"1.5px solid #ef4444":"1px solid rgba(255,255,255,0.06)",
                      boxShadow:sel?"0 0 6px rgba(251,191,36,0.3)":conflict?"0 0 6px rgba(239,68,68,0.4)":"none",
                      zIndex:editId===f.id?20:(sel?10:1),cursor:mode==="placing"?"crosshair":(mode==="dragging"&&sel&&dragCopy?"copy":"move"),
                      transition:mode==="dragging"?"none":"border-color 0.15s",
                      ...blinkStyle}}
                    onDoubleClick={(e)=>{e.stopPropagation();setSelIds(new Set([f.id]));setEditId(f.id);setEditTxt(f.initial);setEditSel({s:f.initial.length,e:f.initial.length})}}>

                    <div style={{position:"absolute",left:-3,top:2,bottom:2,width:3,borderRadius:"1px 0 0 1px",
                      backgroundColor:f.attrs.includes("UNPROT")?"#33cc33":"#44ccee",opacity:.6}}/>
                    {f.hilight==="UNDERLINE"&&(
                      <div style={{position:"absolute",bottom:1,left:0,right:0,height:1,backgroundColor:c.fg,opacity:.7,pointerEvents:"none"}}/>
                    )}

                    {editId===f.id?(
                      <>
                        <input ref={editInputRef}
                          style={{position:"absolute",inset:0,opacity:0,cursor:"text",zIndex:25}}
                          value={editTxt}
                          onChange={e=>{setEditTxt(e.target.value);syncSel();}}
                          onMouseDown={e=>{
                            e.preventDefault();
                            editInputRef.current?.focus();
                            const pos=clamp(Math.round((e.clientX-e.currentTarget.getBoundingClientRect().left)/CELL_W),0,editTxt.length);
                            editAnchorRef.current=pos;
                            editInputRef.current?.setSelectionRange(pos,pos);
                            setEditSel({s:pos,e:pos});
                          }}
                          onMouseMove={e=>{
                            if(e.buttons!==1) return;
                            const pos=clamp(Math.round((e.clientX-e.currentTarget.getBoundingClientRect().left)/CELL_W),0,editTxt.length);
                            const anch=editAnchorRef.current;
                            editInputRef.current?.setSelectionRange(Math.min(anch,pos),Math.max(anch,pos));
                            setEditSel({s:anch,e:pos});
                          }}
                          onMouseUp={e=>{
                            const pos=clamp(Math.round((e.clientX-e.currentTarget.getBoundingClientRect().left)/CELL_W),0,editTxt.length);
                            const anch=editAnchorRef.current;
                            editInputRef.current?.setSelectionRange(Math.min(anch,pos),Math.max(anch,pos));
                            setEditSel({s:anch,e:pos});
                          }}
                          onSelect={syncSel}
                          onKeyDown={e=>{
                            if(e.key==="Enter"){e.preventDefault();commitEdit();}
                            if(e.key==="Escape"){e.preventDefault();setEditId(null);setEditTxt("");setEditSel({s:0,e:0});}
                            requestAnimationFrame(syncSel);
                          }}
                          onBlur={commitEdit}
                          maxLength={f.attrs.includes("UNPROT")?f.length:COLS-f.col+1}/>
                        {(()=>{
                          const nCells=Math.max(f.attrs.includes("UNPROT")?f.length:Math.max(f.length,editTxt.length+1),1);
                          const hasSel=editSel.s!==editSel.e;
                          const selMin=Math.min(editSel.s,editSel.e), selMax=Math.max(editSel.s,editSel.e);
                          return(
                            <div style={{display:"flex",pointerEvents:"none",position:"relative"}}>
                              {Array.from({length:nCells},(_,i)=>{
                                const inSel=hasSel&&i>=selMin&&i<selMax;
                                return(
                                  <span key={i} style={{width:CELL_W,textAlign:"center",flexShrink:0,display:"inline-block",
                                    backgroundColor:inSel?c.fg:"transparent",color:inSel?c.bg:"inherit"}}>
                                    {editTxt[i]||""}
                                  </span>
                                );
                              })}
                              {!hasSel&&<span style={{position:"absolute",top:2,bottom:2,width:1.5,
                                left:Math.min(editSel.s,editTxt.length)*CELL_W-0.75,
                                backgroundColor:c.fg,animation:"bms-blink 0.7s step-end infinite",pointerEvents:"none"}}/>}
                            </div>
                          );
                        })()}
                      </>
                    ):(
                      <div style={{display:"flex",pointerEvents:"none"}}>
                        {fText(f).split("").map((ch,i)=>(
                          <span key={i} style={{width:CELL_W,textAlign:"center",flexShrink:0}}>{ch}</span>
                        ))}
                      </div>
                    )}

                    {sel&&(f.name||dragCopy)&&(
                      <div className="absolute text-xs px-1 rounded" style={{bottom:"100%",left:0,
                        backgroundColor:"#fbbf24",color:"#000",fontSize:8.5,whiteSpace:"nowrap",lineHeight:"14px"}}>
                        {mode==="dragging"&&dragCopy?"+"+(f.name||""):(f.name||"")}
                      </div>
                    )}
                  </div>
                );
              })}

              {mode==="dragging"&&dragCopy&&(Math.round(dragDelta.dx/CELL_W)!==0||Math.round(dragDelta.dy/CELL_H)!==0)&&fields.filter(f=>selIds.has(f.id)).map(f=>{
                const gdx=Math.round(dragDelta.dx/CELL_W)*CELL_W;
                const gdy=Math.round(dragDelta.dy/CELL_H)*CELL_H;
                const c=fColor(f);
                return(
                  <div key={"g"+f.id} className="absolute overflow-hidden pointer-events-none"
                    style={{left:(f.col-1)*CELL_W+gdx,top:(f.row-1)*CELL_H+gdy,
                      width:f.length*CELL_W,height:CELL_H,
                      backgroundColor:c.bg,color:c.fg,fontSize:CELL_W*1.3,lineHeight:CELL_H+"px",
                      border:"1.5px dashed #fbbf24",boxShadow:"0 0 6px rgba(251,191,36,0.3)",
                      opacity:0.7,zIndex:15}}>
                    <div style={{display:"flex"}}>
                      {fText(f).split("").map((ch,i)=>(
                        <span key={i} style={{width:CELL_W,textAlign:"center",flexShrink:0}}>{ch}</span>
                      ))}
                    </div>
                  </div>
                );
              })}

              {rb&&(
                <div className="absolute pointer-events-none" style={{
                  left:Math.min(rb.x1,rb.x2),top:Math.min(rb.y1,rb.y2),
                  width:Math.abs(rb.x2-rb.x1),height:Math.abs(rb.y2-rb.y1),
                  border:"1px dashed #fbbf24",backgroundColor:"rgba(251,191,36,0.08)"}}/>
              )}
            </div>
          </div>
        </div>

        {/* Right Panel */}
        <div className="w-52 bg-zinc-900 border-l border-zinc-700 overflow-y-auto p-3 text-xs flex flex-col gap-2" style={{minWidth:200}}>
          <div className="text-zinc-500 font-bold text-xs tracking-widest mb-1">PROPRIEDADES</div>
          {selIds.size===1?(()=>{
            const f = fields.find(x=>x.id===[...selIds][0]);
            if(!f) return <span className="text-zinc-600">—</span>;
            return (
              <div className="flex flex-col gap-2">
                <PR l="Nome"   tip={TIPS.nome}   v={f.name} o={v=>updField(f.id,{name:v.toUpperCase().replace(/[^A-Z0-9@#$]/g,"").slice(0,8)})}/>
                <PR l="Linha"  tip={TIPS.linha}  v={f.row}    t="number" o={v=>updField(f.id,{row:clamp(+v||1,1,ROWS)})}/>
                <PR l="Coluna" tip={TIPS.coluna} v={f.col}    t="number" o={v=>updField(f.id,{col:clamp(+v||1,1,COLS)})}/>
                <PR l="Tam"    tip={TIPS.tam}    v={f.length} t="number" o={v=>updField(f.id,{length:clamp(+v||1,1,COLS-f.col+1)})}/>
                <PR l="Inicial" tip={TIPS.inicial} v={f.initial} o={v=>{
                  const upd = {initial:v};
                  if(!f.attrs.includes("UNPROT")&&v.length>0) upd.length=v.length;
                  updField(f.id,upd);
                }}/>
                <PR l="PICOUT"  tip={TIPS.picout}  v={f.picout}  o={v=>updField(f.id,{picout:v})}/>
                <PR l="PICIN"   tip={TIPS.picin}   v={f.picin}   o={v=>updField(f.id,{picin:v})}/>
                <PR l="JUSTIFY" tip={TIPS.justify} v={f.justify||""} o={v=>updField(f.id,{justify:v})}/>
                <PS l="VALIDN"  tip={TIPS.validn}  v={f.validn||""} opts={VALIDN_OPTS} o={v=>updField(f.id,{validn:v})}/>
                <PS l="COLOR"  tip={TIPS.color}  v={f.color||"DEFAULT"} opts={COLOR_OPTS}   o={v=>updField(f.id,{color:v})}/>
                <PS l="HILIGHT" tip={TIPS.hilight} v={f.hilight||"OFF"} opts={HILIGHT_OPTS} o={v=>updField(f.id,{hilight:v})}/>
                <PS l="CASE"   tip={TIPS.case}   v={f.case||"UPPER"}   opts={CASE_OPTS}    o={v=>updField(f.id,{case:v})}/>
                <div className="mt-1">
                  {Object.entries(ATTR_G).map(([gn,ga])=>(
                    <div key={gn}>
                      <div className="text-zinc-500 mb-1 mt-2 capitalize">{gn}</div>
                      <div className="flex flex-wrap gap-1">
                        {ga.map(a=>(
                          <AT key={a} l={a} tip={TIPS[a]} on={f.attrs.includes(a)} k={()=>{
                            if(gn==="flags"){
                              updField(f.id,{attrs:f.attrs.includes(a)?f.attrs.filter(x=>x!==a):[...f.attrs,a]});
                            } else {
                              updField(f.id,{attrs:[...f.attrs.filter(x=>!ga.includes(x)),a]});
                            }
                          }}/>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })():(
            <div className="text-zinc-600 text-xs">
              {selIds.size===0?"Nenhum campo selecionado":`${selIds.size} campos selecionados`}
              <div className="mt-4 text-zinc-700 leading-relaxed space-y-1">
                <div>Clique = selecionar</div>
                <div>Ctrl+Clique = multi</div>
                <div>Arrastar vazio = caixa</div>
                <div>Duplo-clique / F2 = editar texto</div>
                <div>Setas = mover seleção</div>
                <div>Delete = excluir</div>
                <div>Ctrl+A = tudo</div>
                <div>Ctrl+Z = desfazer</div>
                <div>Ctrl+Shift+Z = refazer</div>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Status */}
      <div className="flex items-center px-3 py-1 bg-zinc-900 border-t border-zinc-700 text-xs text-zinc-500 gap-4">
        <span>24×80</span>
        {mode==="placing"&&<span className="text-emerald-400">● {placingType ? `Posicionando ${placingType}` : "Posicionamento"}</span>}
        {mode==="dragging"&&<span className="text-amber-400">● Arrastando</span>}
        <div className="flex-1"/>
        {mapset.timestamp&&<span className="text-zinc-500">TIMESTAMP: <span className="text-zinc-400">{mapset.timestamp}</span></span>}
      </div>

      {/* Modals */}
      {showImp&&<Mdl t="Importar BMS" sz="max-w-2xl" x={()=>setShowImp(false)}>
        <textarea className="w-full h-64 bg-zinc-950 text-emerald-300 border border-zinc-700 rounded p-2 text-xs resize-none"
          style={{...mono,whiteSpace:"pre",overflowWrap:"normal",overflowX:"auto"}} placeholder="Cole o fonte BMS aqui..." value={impTxt} onChange={e=>setImpTxt(e.target.value)}/>
        <div className="flex gap-2 mt-3">
          <button className={bP} onClick={doImport}>Importar</button>
          <button className={bD} onClick={()=>setImpTxt(SAMPLE)}>Exemplo</button>
          <button className={bD} onClick={()=>setShowImp(false)}>Cancelar</button>
        </div>
      </Mdl>}

      {showExp&&<ExpMdl mapset={mapset} bP={bP} bD={bD} mono={mono} x={()=>setShowExp(false)}/>}

      {showMs&&<Mdl t="Mapset" x={()=>setShowMs(false)}>
        <div className="text-zinc-500 text-xs font-bold tracking-widest mb-1">DFHMSD</div>
        <div className="grid grid-cols-2 gap-2 text-xs mb-3">
          {[["Nome","name"],["TYPE","type"],["MODE","mode"],["LANG","lang"],["CTRL","ctrl"],["STORAGE","storage"],["TIOAPFX","tioapfx"],["DATA","data"]].map(([l,k])=>(
            <label key={k} className="contents">
              <span className="text-zinc-400 py-1">{l}</span>
              <input className="bg-zinc-950 border border-zinc-700 rounded px-2 py-1 text-zinc-200" style={mono}
                value={mapset[k]||""} onChange={e=>setMapset(ms=>({...ms,[k]:e.target.value}))}/>
            </label>
          ))}
        </div>
        <div className="text-zinc-500 text-xs font-bold tracking-widest mb-1">DFHMDI</div>
        <div className="grid grid-cols-2 gap-2 text-xs">
          {[["Mapa (nome)","name"],["SIZE","size"],["LINE","line"],["COLUMN","column"]].map(([l,k])=>(
            <label key={k} className="contents">
              <span className="text-zinc-400 py-1">{l}</span>
              <input className="bg-zinc-950 border border-zinc-700 rounded px-2 py-1 text-zinc-200" style={mono}
                value={mapset.maps[mapIdx]?.[k]||""} onChange={e=>setMapset(ms=>{
                  const n=JSON.parse(JSON.stringify(ms));n.maps[mapIdx][k]=e.target.value;return n;})}/>
            </label>
          ))}
        </div>
        <div className="flex gap-2 mt-4"><button className={bP} onClick={()=>setShowMs(false)}>OK</button></div>
      </Mdl>}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   Small UI Components
   ═══════════════════════════════════════════════════════════════ */
function Tip({ text }) {
  const [rect, setRect] = React.useState(null);
  const ref = React.useRef(null);
  return (
    <span className="inline-flex items-center ml-0.5"
          onMouseEnter={()=>setRect(ref.current?.getBoundingClientRect())}
          onMouseLeave={()=>setRect(null)}>
      <span ref={ref} className="text-zinc-700 hover:text-zinc-400 cursor-help select-none leading-none" style={{fontSize:10}}>ⓘ</span>
      {rect&&ReactDOM.createPortal(
        <span style={{position:"fixed",zIndex:9999,pointerEvents:"none",
                      top:rect.top-6,transform:"translateY(-100%)",
                      left:Math.max(8,rect.right-218),width:210,
                      background:"#18181b",border:"1px solid #3f3f46",borderRadius:5,
                      padding:"7px 10px",fontSize:11,lineHeight:1.6,color:"#d4d4d8",
                      boxShadow:"0 6px 20px rgba(0,0,0,.75)",whiteSpace:"pre-wrap",fontFamily:"inherit"}}>
          {text}
        </span>,
        document.body
      )}
    </span>
  );
}

function ExpMdl({mapset,bP,bD,mono,x}){
  const [copied, setCopied] = useState(false);
  const doCopy = () => {
    const txt = genBMS(mapset);
    navigator.clipboard?.writeText(txt).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false), 2000);
    });
  };
  return(
    <Mdl t="Exportar BMS" sz="max-w-2xl" x={x}>
      <textarea className="w-full h-64 bg-zinc-950 text-emerald-300 border border-zinc-700 rounded p-2 text-xs resize-none"
        style={{...mono,whiteSpace:"pre",overflowWrap:"normal",overflowX:"auto"}} readOnly value={genBMS(mapset)}/>
      <div className="flex items-center gap-2 mt-3">
        <button className={copied
          ? "px-3 py-1.5 text-xs rounded border bg-emerald-700 text-emerald-100 border-emerald-500 transition-colors"
          : bP}
          onClick={doCopy}>
          {copied ? "✓ Copiado!" : "Copiar"}
        </button>
        <button className={bD} onClick={x}>Fechar</button>
      </div>
    </Mdl>
  );
}

function Mdl({t,children,x,sz="max-w-lg"}){
  return(
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70" onClick={x}>
      <div className={`bg-zinc-900 border border-zinc-600 rounded-lg p-5 w-full ${sz} shadow-2xl`}
        style={{fontFamily:"'IBM Plex Mono',monospace"}} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <span className="text-emerald-400 font-bold text-sm tracking-wider">{t}</span>
          <button className="text-zinc-500 hover:text-zinc-200 text-lg leading-none" onClick={x}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function PR({l,v,o,t="text",tip}){
  return(
    <div className="flex items-center gap-2">
      <label className="text-zinc-500 w-14 text-right flex-shrink-0 text-xs flex items-center justify-end">
        {l}{tip&&<Tip text={tip}/>}
      </label>
      <input type={t} className="flex-1 bg-zinc-950 border border-zinc-700 rounded px-2 py-0.5 text-zinc-200 text-xs min-w-0"
        style={{fontFamily:"inherit"}} value={v} onChange={e=>o(e.target.value)}/>
    </div>
  );
}

function PS({l,v,opts,o,tip}){
  return(
    <div className="flex items-center gap-2">
      <label className="text-zinc-500 w-14 text-right flex-shrink-0 text-xs flex items-center justify-end">
        {l}{tip&&<Tip text={tip}/>}
      </label>
      <select className="flex-1 bg-zinc-950 border border-zinc-700 rounded px-2 py-0.5 text-zinc-200 text-xs min-w-0"
        style={{fontFamily:"inherit"}} value={v} onChange={e=>o(e.target.value)}>
        {opts.map(op=><option key={op} value={op}>{op}</option>)}
      </select>
    </div>
  );
}

function AT({l,on,k,tip}){
  return(
    <button title={tip} onClick={k} className={`px-2 py-0.5 rounded text-xs transition-colors ${
      on?"bg-emerald-800 text-emerald-200 border border-emerald-500":"bg-zinc-800 text-zinc-500 border border-zinc-700 hover:border-zinc-500"
    }`}>{l}</button>
  );
}



ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(BMSEditor));
  </script>
</body>
</html>
